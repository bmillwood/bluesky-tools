on:
  schedule:
  - cron: "30 17 * * 5" # Friday afternoon
  workflow_dispatch:
  pull_request:
    paths:
    - .github/renovate.json
    - .github/workflows/renovate.yml

jobs:
  upgrade:
    runs-on: ubuntu-latest
    env:
      RENOVATE_DRY_RUN: ${{ github.event_name == 'pull_request' }}
      RENOVATE_ONBOARDING: false
      RENOVATE_REPOSITORIES: ${{ github.repository }}
      LOG_LEVEL: debug
    steps:
    - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
      id: app-token
      with:
        client-id: ${{ secrets.RENOVATE_APP_CLIENT_ID }}
        private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}
        permission-contents: write
        permission-issues: write
        permission-workflows: write
        # When run from a PR, it should be in dry-run mode, so shouldn't create PRs.
        # But if it did, it's not too hard to imagine a PR creation loop. So
        # let's add another layer of protection.
        permission-pull-requests: "${{ github.event_name == 'pull_request' && 'read' || 'write' }}"
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
    - uses: renovatebot/github-action@8217b3fc286df088d7c27f3255fe8414463bc0fd # v46.1.15
      with:
        renovate-version: 43.214.4 # renovate: datasource=docker depName=ghcr.io/renovatebot/renovate
        token: ${{ steps.app-token.outputs.token }}
