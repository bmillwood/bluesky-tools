on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - .github/workflows/nix.yml
      - '**.nix'
      - '**.cabal'

env:
  nixpkgs_version: d233902339c02a9c334e7e593de68855ad26c4cb # renovate: datasource=git-refs depName=NixOS/nixpkgs packageName=https://github.com/NixOS/nixpkgs currentValue=nixos-unstable

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -euo pipefail {0}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          nix_path: nixpkgs=https://github.com/NixOS/nixpkgs/archive/${{ env.nixpkgs_version }}.tar.gz

      - run: nix-build
